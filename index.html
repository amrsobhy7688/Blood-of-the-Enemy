rhood will be waiting in the dark to intercept.\n\nAsmodeus promises support and says the Brotherhood will make sure Zaren’s men are not harmed, but the assets must be extracted and taken to Brotherhood safe houses before the Ministry realizes what happened.\n\nZaren tries to keep control of the mission\n\nZaren refuses to accept a plan that simply wrecks the transport and leaves him ruined.\n\nHe says he cannot fail at something this large, not if it may sabotage them in the future.\n\nHe asks instead whether there is any undetectable tracking method.\n\nAsmodeus says no. Magic like a Null Sigil would be trackable by the Ministry as well.\n\nSo Zaren proposes another plan:\n\nhave one of the closest brothers ready to be taken hostage.\n\nSomeone who will not crack.\n\nAsmodeus pushes back, warning that if the Ministry gets such a person, they will eventually break them.\n\nStill, he agrees to think.\n\nHe tells Zaren to keep the prisms just in case.\n\nZaren promises that something will be delivered rather than nothing.\n\nAsmodeus reaches out to shake his hand and says:\n\nAsmodeus Vein: “The flame will not drown.”\n\nThat seals the understanding.\n\nBy the end of this scene, Zaren is trapped between:\n\nhis oath and position in the Guilded Guards\n\nthe direct attention of Julius Mccord\n\nthe expectations of the Brotherhood\n\nand the knowledge that his family is quietly aligned with the warning, not with the Ministry\n\nAlex Talus’s Intro\n\nHouse Talus in panic\n\nThe scene shifts to the Talus Estate, one day after the Gala of the First Crown.\n\nThe household is in chaos.\n\nAlex Talus is in her private room, which appears clinically perfect, perhaps the cleanest room imaginable.\n\nBut that perfection is false.\n\nWith her are two cousins:\n\nAria Talus\n\nHalia\n\nAria is pale, trembling, holding a paper, and crying.\n\nShe tells Halia that they took Caspian in the middle of the Beacon Ignition.\n\nNot only did they arrest him, they erased him.\n\nShe says the Ministry is already at the cutting shops, siphoning the vaults, and saying that the Talus name is stained by the shadow of sedition.\n\nHalia tries to calm her and says Caspian is not really part of their family anyway.\n\nAria snaps back that it does not matter.\n\nThe Auditor General is here.\n\nTheir father is on his knees downstairs.\n\nThe family needs a sacrifice to prove it is not part of Caspian’s “logic.”\n\nThey are looking for someone expendable.\n\nThat is the emotional state of the house before Alex is even summoned.\n\nJulius Mccord corners the Talus family\n\nThe scene shifts to the grand foyer below.\n\nThere, Julius Mccord stands alone, addressing Gerald Talus, Alex’s father.\n\nHe reminds Gerald that the Ministry holds most of House Talus’s contracts.\n\nGerald corrects him: 74%.\n\nHe proudly describes Talus precision in reagents, alchemy, and the maintenance of the High Spires’ flawless glow.\n\nMccord leans in and says a flaw has been detected.\n\nCaspian has stained their ledgers.\n\nHis ideas are contagion.\n\nThe Ministry is commissioning a transport to remove the infection and now requires a Talus monitor to accompany the shipment, to ensure the transport crystals do not suffer harmonic overload.\n\nHe presents it as a simple field internship, perhaps for Gerald’s daughter or one of her cousins. A chance for House Talus to prove devotion to stability rather than sedition.\n\nGerald tries to defend Alex by saying she is a researcher, a student of the Light.\n\nMccord cuts him off.\n\nHe does not care who she is.\n\nSince Gerald mentioned her, he says, she is exactly who they need.\n\nShe will find the Penance a most illuminating classroom.\n\nThe choice is not really a choice.\n\nGerald breaks and forces Alex to go\n\nGerald rushes upstairs to Alex, throws the other girls out, closes the door, and grabs her by the shoulders.\n\nHe explains what is at stake.\n\nThe vibration in the walls, the hum of the aether crystals, the life of the house itself, all of it depends on Talus remaining in favor.\n\nIf the Ministry pulls even one of their contracts, the hum stops.\n\nAnd when the hum stops, they cease to exist.\n\nHe reminds Alex that she saw what happened to House Vermont:\n\nthey did not merely arrest Lysandra. They turned her siblings into ward stewards, prisoners in their own home, while House Aurelian siphoned their legacy.\n\nHe refuses to let that happen to House Talus.\n\nHe says he will not watch his daughters wearing Null Sigils because of Caspian’s arrogance.\n\nThen he gives Alex the role directly.\n\nThis “internship” is not an internship.\n\nIt is a blood sacrifice to prove the family is still in line.\n\nAlex is the only one with the right credentials who is not already monitored.\n\nShe knows the crystal work better than anyone.\n\nShe has studied under Caspian.\n\nShe is the only one who can satisfy the Ministry and stabilize the transport.\n\nHe hands her the paper and orders her:\n\nreport to Marshal Zaren\n\nact as the technical liaison for the transport\n\nkeep his crystals stable\n\ndo whatever it takes to ensure the shipment reaches its destination\n\nbecome the reason the Talus name stays in the light\n\nThen he gives her one final practical instruction:\n\nstick close to Zaren.\n\nHe will protect her.\n\nThe paper formally instructs her to report to Marshal Zaren Dryce and work under him until the journey is complete.\n\nWhere Session 0 leaves the board\n\nBy the end of Session 0, the key lines of tension are already in place:\n\nLysandra Vermont has been set up and erased by forged crystal crime\n\nCaspian Talus Dryce has been politically framed as a seditionist and magical contaminant\n\nZaren Dryce has been chosen by the Ministry for a sensitive escort while simultaneously pressured by the Brotherhood to sabotage it\n\nAlex Talus has been forced into the role of technical monitor to preserve House Talus’s standing\n\nThe transport that will become the center of Session 1 is now fully prepared as a convergence point.\n\nEveryone is being moved toward the same ship for different reasons:\n\npunishment\n\ncover-up\n\nloyalty test\n\nsabotage\n\nsurvival\n\nAnd none of them yet knows how completely those motives are about to collide.",
  "s1": "The Sanctification Cells\n\nThe session opens in the Sanctification Cells, a temporary holding facility beneath the Ministry of Sanctification.\n\nMore specifically, the party is in the Dampening Chamber, built by House Vein.\n\nThe air smells sharply of chlorine. Even underground, the hum of the High Spire above is unmistakable, because the aether crystals inside it are enormous.\n\nInside the only occupied cage sits a brown-haired girl with dirty hands and clothes.\n\nThis is Lysandra Vermont.\n\nHer life was unmade three days ago.\n\nShe sits on the floor, trying to process what has happened to her.\n\nHer thoughts churn:\n\nshe feels betrayed\n\nshe feels helpless\n\nshe is thinking about her siblings\n\nshe is trying to understand who did this to her family\n\nshe is certain that someone forged the signature\n\nsomeone wants to take their place\n\nsomeone wants the Vermonts erased\n\nShe also remembers cutting gems, and knows that the gems they found empty bore the Vermont facet, even though she never personally saw the box.\n\nThat memory matters because it suggests that even before her arrest, she already had reason to suspect a deliberate setup.\n\nLady Vermont comes in secret\n\nThe only door to the chamber usually opens once every twenty-four hours for a guard to bring food and water.\n\nBut suddenly it grinds open at the wrong time.\n\nInstead of a guard, a woman enters in black silk with her face covered like a mourner at a funeral.\n\nIt is Lady Vermont, Lysandra’s mother.\n\nHer face is heavy with grief.\n\nBehind her enters a High Templar in a silver full-mask. He whispers something in her ear and then steps outside to wait.\n\nLady Vermont looks at her daughter and says:\n\nLady Vermont: “You look like a common debtor, Lysandra. What happened with you?”\n\nLysandra answers sharply:\n\nLysandra: “You tell me first what happened.”\n\nHer mother tells her the scale of the disaster.\n\nTheir house is occupied. Her siblings are prisoners in their own home. She herself is not even allowed to say the name Vermont aloud.\n\nShe asks Lysandra what she has done.\n\nLysandra insists she has done nothing.\n\nSomeone betrayed them.\n\nShe begs her mother for help:\n\ngo back\n\nsearch for papers\n\nfind anything related to her father\n\nlook for anything that might explain what is happening\n\nLady Vermont says the Ministry has told her that Lysandra’s father may be involved. She asks whether his actions are chasing the family from the grave.\n\nLysandra insists he is innocent.\n\nLady Vermont laments how hard they worked to avoid ever falling this low, then asks what Lysandra needs.\n\nLysandra repeats that she needs information.\n\nHer mother then gives her the worst practical news:\n\nshe will not be able to come back.\n\nThe Ministry is moving her.\n\nWhen Lysandra asks where, Lady Vermont says she does not know.\n\nThen, checking that the door is closed, Lady Vermont leans in and secretly pulls something from her pocket.\n\nShe has brought Lysandra her jeweler’s tools.\n\nShe says perhaps Lysandra can find solace in them here.\n\nLysandra thanks her.\n\nThen Lady Vermont tells her something far stranger and more important.\n\nShe says there is a reason the Vermont facet never flickers.\n\nIt was not only her father’s skill.\n\nBefore Lysandra was born, her father went into a dark place, met a king, and made a deal.\n\nHe invited the light to sit where his heart used to be.\n\nLady Vermont calls it a burden of inheritance.\n\nShe says that king did not wear a crown.\n\nShe does not believe Lysandra’s father signed the ledgers.\n\nThen she says she will try to get Lysandra out, though the odds are terrible, and leaves.\n\nThis is one of the first major revelations of the campaign:\n\nthe Vermont line is tied to some inherited bargain involving light, a king, and a heart replaced by something else.\n\nCaspian is thrown into the neighboring cell\n\nAs Lady Vermont leaves, boots and voices sound outside.\n\nTwo Guilded Guards enter dragging an unconscious man across the floor by his feet.\n\nHis Researcher Prime robes are torn.\n\nBoth hands are branded with two glowing Null Sigils on the back.\n\nThat alone is extraordinary, since one Null Sigil is already severe. Two means the Ministry was being exceptionally careful.\n\nThe guards throw him into the adjacent cell, lock it, turn the key, and deliberately kick the cage so Lysandra will watch.\n\nThen they leave.\n\nThe outer iron door locks.\n\nLysandra is left completely alone with the new prisoner.\n\nThis is Caspian Talus Dryce.\n\nHe has not eaten, drunk, or rested properly for twenty-four hours. He has been moved repeatedly from place to place with his head covered, as the Ministry tried to lose a tail before finally bringing him here.\n\nWhen he wakes, he feels terrible.\n\nAll of his belongings have been stripped from him.\n\nThe first thing he does is check the golden tattoo he drew on his arm.\n\nIt is still there.\n\nThat matters, because it is not merely decoration. He secretly built function into it.\n\nHe looks up and sees Lysandra, who has been trying to wake him by throwing things at him.\n\nLysandra recognizes him before he recognizes her.\n\nLysandra: “Oh look, I know you. I know you. How come you are here?”\n\nCaspian answers warily:\n\nCaspian: “Thank my lucky stars. Who are you, my dear? What brought you here?”\n\nLysandra says they arrested her and insists it is not her fault. She identifies herself as being from House Vermont and asks if he knows them.\n\nCaspian immediately asks the real political question:\n\nCaspian: “Which house has taken over?”\n\nLysandra says she still does not know.\n\nCaspian then asks whether she has heard of House Aurelian.\n\nShe says yes.\n\nThis is the first signal that Caspian already suspects noble-house maneuvering behind the case.\n\nCaspian secretly rebuilds a toolkit from his own skin\n\nWhile they speak, Caspian starts scraping the golden tattoo off his arm.\n\nThis is not self-harm or panic.\n\nHe is secretly disassembling a tool kit he had ingeniously tattooed into his own skin, interlocking the pieces so that the bronze tattoo can be turned back into thieves’ tools.\n\nHe cannot use magic because of the Null Sigils, so he is already adapting.\n\nThat detail is very important for understanding Caspian:\n\neven stripped, tracked, exhausted, and caged, he is still building.\n\nJulius Mccord condemns them both\n\nThen Auditor General Julius Mccord enters.\n\nHe is followed by two guards wearing the uniform of a man already in the room, someone hidden or invisible in one of the cages.\n\nMccord wears a silver half-mask and carries a ledger.\n\nHe leans in and whispers something to the hidden man, who replies.\n\nThen Mccord turns to Lysandra and Caspian and says:\n\nJulius Mccord: “I told you not to seek defense. Right? You were told. Your family cannot save you. You have stolen from the Ministry.”\n\nLysandra protests that she did not.\n\nThen Mccord turns to Caspian and attacks him differently.\n\nHe says many people think Caspian is brilliant, but they know the truth.\n\nThey say it was all a fluke of luck.\n\nThen he pronounces sentence:\n\nJulius Mccord: “Caspian Talus Dryce, Lysandra Vermont, you are unfit. You are stripped of your names. You are condemned to permanent exile to the continent of Vastraya. You are to be transported on board the Penance.”\n\nThat is the formal beginning of their exile.\n\nZaren arrives at the docks\n\nMeanwhile, Marshal Zaren Dryce arrives in Cyritium at dawn.\n\nHis team, an elite fifteen-man platoon, is in top shape, fully equipped, and well-rested.\n\nA junior auditor tells him only the practical details:\n\nbe at the docks at 6 PM\n\nwait for a technician\n\nno further information is given\n\nAt the docks, the air is thick with the static of arriving ships.\n\nThe ships are powered by massive aether crystals, and when many gather close together, their crystals resonate badly and large-form crystals lose charge.\n\nThat is why the ships are parked far apart.\n\nThe hum of the crystals is intense.\n\nZaren is placed in charge of the ship, alongside:\n\nhis fifteen men\n\nfive navigators from House Castrell\n\nThen a young technician arrives carrying a bag and hands Zaren her deployment papers.\n\nThis is Alex Talus.\n\nShe boards the ship and immediately notices that the aether crystals are installed directly into the mast, both above and below deck. The ship carries no sails. It is powered entirely by those crystals, which she has been assigned to monitor.\n\nZaren takes command of the ship\n\nZaren begins sweeping the vessel and issuing orders.\n\nHe asks whether the shipment has already arrived on board.\n\nHe is told:\n\nthe shipment is already aboard\n\nit came with three individuals and a general auditor wearing a silver mask\n\nthe three who delivered it have already left\n\nthe navigators and crew are on ship\n\nonly Captain Castrell is still awaited\n\nZaren gives a precise order:\n\neverything must be ready by 6:50. The ship moves at 7:00.\n\nSoon, a man approaches wearing a captain’s hat and a short feathered cape.\n\nHe looks nothing like a typical polished House Castrell noble. He is unkempt, not clean-shaven, and resembles a civilian sailor far more than a military officer.\n\nStill, his papers prove that he is the captain.\n\nThe hold of the Penance\n\nZaren goes down into the hold.\n\nThere he finds Caspian and Lysandra sitting on a bench, bound hand and foot to the floor.\n\nBehind them are three massive wooden crates, secured with straps.\n\nZaren and Caspian immediately recognize each other. They played together fifteen years ago when they were young.\n\nZaren maintains a completely neutral face and says aloud:\n\nZaren: “Peculiar situation we find ourselves in.”\n\nAt the same time, he sends a telepathic message directly into Caspian’s mind:\n\nDo you know about the crew that House Aurelian are staging?\n\nCaspian uses Detect Thoughts to receive and process it, reading not only the message but Zaren’s tactical awareness of the room:\n\ntwo prisoners\n\nthree crates\n\ntwo exits\n\nthe structure of the ship\n\nhow the ship is being guarded\n\nCaspian responds telepathically:\n\nSo you know they are being shipped to the continent, and if Zaren was chosen to be here, then he too is being cast out.\n\nThe alliance is not explicit yet, but the old recognition is already turning into covert coordination.\n\nThe ship departs\n\nA crew member comes down and tells Zaren it is time to move.\n\nThe ship begins to vibrate.\n\nAbove deck, the captain takes hold of a small steering device, and the ship veers away from the dock into open water.\n\nWith his arcane expertise, Caspian immediately notices how inefficient the ship’s crystal array is. It interacts poorly with the surrounding ships’ resonance.\n\nThat observation matters because Caspian cannot stop analyzing systems, even in chains.\n\nZaren whistles, and his mechanical bird familiar flies down to him.\n\nAt the same time, Caspian reaches upward mentally again and reads the drunk captain’s surface thoughts.\n\nWhat he senses is not confidence.\n\nIt is fear.\n\nThe captain’s most prominent thought is:\n\n“The land of the law is three days behind us.”\n\nThat phrase paints the voyage as a threshold.\n\nThey are not just leaving port.\n\nThey are leaving legality, order, and recognized civilization.\n\nThe captain leans in, and Caspian finishes the lockpicks\n\nLater, down in the hold, the captain leans in close to Caspian and says:\n\nCaptain: “They give you the special treatment. Never seen one with two.”\n\nHe is referring to the two Null Sigils.\n\nIn the darkness, Caspian finishes assembling his lockpicks.\n\nThe session closes on that image:\n\nLysandra has learned her family carries an inherited secret tied to a bargain with light\n\nCaspian has been stripped, branded, and condemned, but is already rebuilding tools from his own skin\n\nZaren has taken command of the ship carrying them into exile\n\nAlex has boarded as the crystal technician\n\nand the Penance is now underway toward Vastraya",
  "s15": "After the shipwreck\n\nAfter the shipwreck, Mara tells the survivors:\n\nMara: “Give me a few minutes to catch my breath. Hold the seal. Don’t wander far, and look for gear and weapons. You will need them.”\n\nZaren checks on Alex and notices that she is badly wounded, close to death, and needs help even to stand.\n\nMeanwhile, Caspian and Lysandra walk along the shore to scavenge.\n\nCaspian tries to understand Lysandra\n\nAway from the others, Caspian starts questioning Lysandra about her strange abilities.\n\nHe explains that he has apprenticed under many magical traditions and prides himself on knowing the nature of magic.\n\nWhat Lysandra can do does not resemble anything he has seen before.\n\nHe tells her he has a theory, but wants to know whether she is willing to talk about it.\n\nLysandra refuses.\n\nCaspian insists that he is not narrow-minded and that he values knowledge above judgment. He tells her that if she wants to keep secrets, they are safe with him.\n\nLysandra shifts the subject and asks him about a phrase he used earlier, specifically whether he knows about the group behind it and whether he is part of it.\n\nCaspian answers honestly:\n\nhe tried to infiltrate that group\n\nhe wanted to understand what kind of knowledge they had\n\nin terms of faith, he counts himself among the faithless\n\nhe is not devoted, only curious\n\nhe wants to understand what happened before and after the calamity\n\nhe has been knocking on every door he can find, and that group is one of them\n\nLysandra says that words alone are not enough. He will need to prove himself over time.\n\nThis is one of the first true trust-building conversations between them, and it ends unresolved.\n\nThe shore is dead and strange\n\nAs they scavenge, Mara shouts at them not to wander too far.\n\nLysandra trips several times over her dress and falls face-first into the sand.\n\nCaspian studies the shore carefully and notices several important things:\n\nthe ocean current is extremely fast\n\nwreckage does not seem to come from a single ship\n\nthe current appears to be dragging everything toward this shore\n\nthe sand is black obsidian\n\nthe rocks are black\n\nwhen studied closely, the ground shimmers with fine grains of glass\n\nthere is no natural vegetation, fauna, birds, animals, or fish\n\nThis is a dead coast.\n\nCaspian discovers a small piece of glass that looks like quartz and gives off a very faint bright light. It is completely alien to him and has no kinship to ordinary aether crystals.\n\nLysandra finds a clear piece of glass.\n\nBefore she can touch it, Mara shouts:\n\nMara: “Stop! Don’t touch it with your hands. It will bite you.”\n\nLysandra uses her sock to pick it up safely.\n\nCaspian tries to chip his strange crystal with a chisel, but it is extremely resistant.\n\nThen he tests his magic.\n\nHe feels as though he is underwater, and the Null Sigils on his hands flare brighter, stopping him from properly reaching the aether, though he does manage to cast Mold Earth.\n\nThat is a critical clue:\n\nthe sigils are still active enough to interfere, even after everything that has happened.\n\nMara gives the crash course on Vastraya\n\nWhen they return, they find Mara resting against the cliff and cleaning her weapons.\n\nShe asks if they found any sharp weapons.\n\nCaspian responds politely and uses a phrase from the Church of the Sovereign Scars:\n\nCaspian: “Mara of the Iron Will. Let your iron be true.”\n\nMara is surprised that he knows it.\n\nShe studies both of them and rapidly reads their backgrounds by dress, hands, and bearing.\n\nThen she begins what she calls the crash course on Vastraya.\n\nShe explains:\n\nthe earth is hungry\n\nthe air and land will turn their skin brittle and their minds to static\n\nthey will eventually become Hollow\n\na Hollow is a being of glass and resentment wandering the shores\n\nAs she speaks, the group begins to notice the constant low-frequency ringing in their ears that makes them grit their teeth.\n\nMara continues:\n\nMara: “You can already feel it, can’t you? That bone-deep ache. That’s the static. It’s the scream of the land. And it’s hungry for you.”\n\nThen she tells them what they need:\n\nMara: “If you want to survive tonight, I suggest that you listen to me. You won’t do it with machines, perfume or prayer. You need the glass.”\n\nShe orders them to scour the area for shards that have not been bleached and warns them again not to touch them bare-handed.\n\nThen she makes a promise:\n\nif they turn, she will put them to rest herself.\n\nThat, she says, is the only mercy anyone will give them in this land.\n\nMara bonds Lysandra first\n\nMara takes Lysandra first.\n\nShe pierces Lysandra’s arm with her own glass-infused fingernail and embeds the clear shard into her skin.\n\nLysandra’s blood grips the shard and pulls it inward.\n\nThe clear glass turns yellow.\n\nMara names this shard:\n\nthe Silent Scream\n\nLysandra gains:\n\nproficiency in Insight\n\nproficiency in Perception\n\nBut the cost is immediate:\n\nmaximum hit points reduced by 5\n\ndisadvantage on saving throws against poison and disease\n\nAt that same moment, Lysandra hears a baby’s voice in her head say:\n\nVoice: “Mother, don’t believe her.”\n\nThis is the first known instance of that internal voice.\n\nMara breaks Caspian’s Null Sigils\n\nNext, Mara turns to Caspian.\n\nShe takes his hands and begins reciting a corrupted, bitter version of the Prayer of Ignition.\n\nInstead of reverence for Solaria, it is full of mockery, resentment, and curses.\n\nThen she suddenly pulls out a thirty-centimeter metal spike and drives it through his hands, painfully breaking the Null Sigils.\n\nAs the aether floods back into Caspian’s soul, he feels the pain in his palms contrasted by overwhelming joy at the return of his magic.\n\nAt the same time, he feels resentment toward himself for only fully valuing his magic once he had lost it.\n\nHe suffers disadvantage on checks requiring his hands until they heal.\n\nMara then takes the crystal he found and claims it for herself.\n\nInstead, she embeds a smoky gray shard between his fingers.\n\nAs it bonds, it turns gray and stops reflecting light.\n\nCaspian uses Detect Thoughts on Mara and catches her surface thought:\n\n“One down, one to go.”\n\nCaspian gains the ability to defer damage once per day, but at the cost of:\n\nmaximum hit points reduced by 5\n\ndisadvantage on Constitution saves against poison and disease\n\nThe black stone door and the hidden chamber\n\nAfter resting, Caspian and Lysandra explore farther down the shore as the tide recedes unnaturally fast.\n\nThey discover a sunken black stone door marked with four ancient rune symbols, with an eye symbol at the top.\n\nThe inscription reads:\n\n“Four lands were bound with a silver thread. Four crowns were taken to this island bed. To see the past that the Sovereigns chose, give the light that the shadow knows.”\n\nCaspian places his hand on the eye rune and channels his magic into it.\n\nThe golden tattoo on his arm glows, transferring light into the eye.\n\nThe eye blinks.\n\nThe door grinds open.\n\nA voice echoes in their minds:\n\nVoice: “The Four corners were never meant to be a cage. They were the foundation.”\n\nInside they find a small slanted antechamber illuminated by shifting magical light from an ambient enchantment.\n\nPillars line the room, each decorated with ancient statues of Vastrayan people.\n\nAt the center, atop a spiral golden rod, sits a fragile glass dome containing a small model of a temple on a grassy cliff by water.\n\nThe temple bears the same bottom rune symbol from the door.\n\nCaspian carefully lifts the fragile glass dome away.\n\nThe voice speaks again:\n\nVoice: “They forgot the name whispered before the world turned violet. I am the echo of a song sung in a different key. I am the Sovereign Cyr.”\n\nThe chamber awakens\n\nCaspian and Lysandra team up to unscrew the spiral rod from the floor.\n\nAfter turning it three times, the room answers.\n\nGrinding stone fills the chamber.\n\nThree stone figures emerge from the pillars with weapons drawn.\n\nA battle begins.\n\nAs it starts, the mysterious voice continues revealing fragments of hidden history:\n\nVoice: “We were not their hands. We were their chains. They gave us steel to kill a king so they could wear his crown. She made sure the weaver’s hands went still.”\n\nLysandra hears the baby’s voice in her mind again:\n\nVoice: “Mother, don’t believe her.”\n\nShe gains 5 temporary hit points.\n\nThen the woman’s voice continues:\n\nVoice: “The heavens are empty not by chance but by design. Vajran burst his skin. Arcanon stopped the world from drifting. Kaelanor poured his blood into the soil. And I stood between you and the sun of a dying heart.”\n\nCaspian hears jumbled words in his mind, but catches a few clearly:\n\njailer\n\ninfinite\n\nevery\n\nburned\n\nThen he hears the final phrase clearly:\n\n“Nail pulled from the door.”\n\nAnd then the voice goes completely silent.",
  "s2": "Shipwreck, awakening, and the first Refracted\n\nThe session opens in the aftermath of disaster.\n\nThe party’s ship exploded, and they were thrown onto the shore. As they regained consciousness, they heard the sounds of fighting.\n\nWhen they fully woke, they found themselves facing strange creatures: the Refracted.\n\nThe Refracted looked like ordinary humans in normal clothes, except as if they were dead. Glass shards protruded from their bodies.\n\nAfter killing them, the party encountered Mara of the Iron Will on the shore. She told them she needed a short rest.\n\nMara rests while the party regroups\n\nWhile Mara tried to recover, the party briefly split up.\n\nZaren Dryce stayed with Mara and made sure she was okay.\n\nLysandra Vermont and Caspian Talus Dryce went off for about half an hour, searching the ground for supplies or anything useful.\n\nBy the time they returned, Mara had mostly caught her breath, though she had not truly completed a short rest.\n\nWhen Lysandra returned, she looked badly shaken. Her hair was disheveled, and there was blood on her face.\n\nCaspian looked normal.\n\nLysandra also had a small black cat walking beside her. The cat had silver eyes.\n\nZaren studies Mara while they are alone\n\nDuring the time alone with her, Zaren notices several unsettling details about Mara.\n\nShe is deeply exhausted, but her body does not look like it should be capable of this level of fatigue.\n\nThe reason soon becomes visible:\n\nthe glass protrusions are coming from her own body.\n\nZaren also notices something strange about her equipment. She carries:\n\ntwo daggers\n\na shortsword\n\na longsword on her back\n\na lance\n\nIt is an unusual combination of weapons for one person.\n\nMara explains the land\n\nWhen the group is together again, Mara immediately warns them about Vastraya.\n\nMara of the Iron Will: “This place, this land here in Vastraya, is hungry and wrong.”\n\nShe tells them that their skin is burning and their minds are in static. If they remain like this, they will become Hollow.\n\nThey do not yet know what that word means.\n\nMara explains that the Hollow are beings of glass and resentment wandering the shores, like the creatures they just fought.\n\nIt is obvious from the way she speaks that she is deeply disgusted by them.\n\nThe ringing in the land\n\nThe effects of the land are already beginning to take hold.\n\nZaren notices a constant ringing in his ears.\n\nAlex Talus feels the same ringing, but with an extra layer of discomfort, like the sound is making her grind her teeth without realizing it.\n\nMara explains:\n\nMara: “That bone-deep ache, that ringing, is the scream of the land. It is hungry for you.”\n\nThen she tells them what they need to survive the night:\n\nMara: “If you want to survive this night, you will do it with prayers or perfume. You will need the glass.”\n\nZaren and Alex are sent to gather shards\n\nMara sends Zaren and Alex to search the area for shards of glass large enough to use.\n\nShe warns them clearly:\n\nMara: “Do not touch them with your bare hands. The glass is strange. It will seek you out and bite you. It will feed until there is nothing left.”\n\nThe warning is literal, not metaphorical.\n\nA coded exchange between Mara and Zaren\n\nWhile the others search, Zaren kneels near Mara and asks whether there is anything he can do to make her more comfortable.\n\nMara studies him and replies with a coded question:\n\nMara: “You are a follower of Elidria? I usually get these right. What do you follow? Which of them?”\n\nZaren answers in kind, identifying himself with the Winged Watch path and confirming that he is a follower of the Sovereign Quadrants.\n\nThen he says:\n\nZaren: “The tide is coming.”\n\nMara replies:\n\nMara: “But the seal will hold. I think you will find that the caverns suit you more. No help is needed from your kind.”\n\nThis exchange clearly signals that the two of them recognize something about one another’s religious or factional alignment, even if the full meaning is not yet explained.\n\nTwo shards are recovered\n\nAlex finds a long, thin piece of black glass.\n\nRemembering Mara’s warning, she uses cloth to pick it up rather than touching it directly.\n\nZaren finds another shard, nearly circular like a coin, with purple smoke moving inside it.\n\nThey bring both shards back to Mara.\n\nMara bonds the party to glass\n\nMara tells them bluntly:\n\nMara: “You would not survive without the glass. I need to bond you.”\n\nShe asks who will go first.\n\nZaren volunteers.\n\nMara takes the circular shard from him and handles it easily in her bare hands. Then she grips his shin.\n\nAt that moment, Zaren notices something crucial:\n\nMara’s nails are themselves glass, as if they are naturally part of her body.\n\nShe drives one of those glass nails into his leg, peeling the skin down. The pain is severe. Then she presses the shard into the wound.\n\nAs soon as it touches him, Zaren feels suddenly heavy, as though he has gained ten kilos. The shard seems to search for the right position inside the wound, dragging itself until it settles at a strange angle inside his leg. Then it glows purple.\n\nMara looks at him and says:\n\nMara: “Sorry, lord. You’ll never dance again.”\n\nThen she adds:\n\nMara: “If it were for me, I would have left you here. But I know that if you came back as Refracted, I would not enjoy killing you. What you follow is naught but torment.”\n\nAlex chooses the ear\n\nAlex offers her own shard and says she wants it placed in her ear.\n\nMara agrees.\n\nShe pierces Alex’s ear with a glass nail and threads the long black shard through it. Alex’s ear splits and bleeds as the shard bends and wraps itself into a black ring around her right ear.\n\nMara tells her:\n\nMara: “This one is hungry for light, but it will help you in this dark.”\n\nLysandra and Caspian are also bonded\n\nLysandra is bonded as well. Her shard is yellow.\n\nCaspian is also meant to be bonded, but Mara cannot do it while the Null Sigil restraints are still on his hands.\n\nSo she removes them first.\n\nTo remove Caspian’s Null Sigils, Mara takes out a much smaller crystal, older and weaker-looking. She asks for his hand, and he gives it.\n\nShe begins reciting the Prayer of Ignition, part of the Song of Resonance, but Lysandra notices that the prayer is full of curses against Solaria.\n\nMara is mocking him while she works.\n\nThen she takes out an iron spike-like tool and drives it through his hand to remove the sigil.\n\nOnly after that does Caspian receive a gray shard with swirling smoke between two fingers.\n\nHe had first found a mint-colored shard, but Mara stopped him and kept that one for herself, telling him:\n\nMara: “No. This one is for me. Let me find another one for you.”\n\nThe effects of the bonding\n\nAfter the bonding is complete, the party learns the effects.\n\nAlex Talus\n\nmaximum HP reduced by 5 while the shard remains in her body\n\ndisadvantage on Constitution saving throws against disease and poison\n\nin dim light or darkness, she can hide more effectively\n\nZaren Dryce\n\nmaximum HP reduced by 5\n\ndisadvantage on Constitution saving throws against disease and poison\n\nattempts to move him against his will are made at disadvantage\n\nbecause of the shard in his leg, he automatically fails Acrobatics checks\n\nThese effects make it clear that the glass is not a clean blessing. It preserves life, but always at a cost.\n\nMara refuses to explain on the shore\n\nAfter the bonding, Alex asks Mara:\n\nAlex: “How did you get here?”\n\nMara answers:\n\nMara: “This is not the place for stories. Let us reach Hold Mount. I will explain there.”\n\nThen she asks Alex:\n\nMara: “Are you a follower of Lunaria or Solaria?”\n\nAlex answers that she is neither.\n\nMara replies:\n\nMara: “Good on you. We are alike in that.”\n\nThen she adds:\n\nMara: “This earth here is hungry. We cannot stem the obsidian sand. Let me take you to Hold Mount.”\n\nThe march toward Hold Mount\n\nThe group begins moving with Mara along the shore toward Hold Mount.\n\nZaren asks whether they can pass by the place where the waves break, in case they can salvage anything from the wreck.\n\nMara answers:\n\nMara: “Everything breaks at Hold Mount. If you lost something, you will find it on its shore.”\n\nThen she warns them:\n\nMara: “Remember: a single link fails one of you, and two see the day. We move as a chain.”\n\nThis reflects the same chain-and-link worldview already hinted at in her earlier coded exchange with Zaren.\n\nMara kills Caspian’s familiar instantly\n\nAs they walk, Caspian sends out his familiar to scout.\n\nThe moment it rises from his shoulder, Mara whirls with terrifying speed and throws a dagger, killing it instantly.\n\nShe says:\n\nMara: “You need to tell me before you do these kinds of things.”\n\nCaspian asks why she reacted that way, pointing out that there are no visible animals or birds here.\n\nMara replies:\n\nMara: “The reason there are no animals here is because this place is wild. If it is flying, it is a predator or food.”\n\nThe reaction is not just practical. It is instinctive, immediate, and violent.\n\nZaren sees fear beneath Mara’s anger\n\nAs they continue, Zaren asks why Mara carries daggers if she fears flying things so much.\n\nHe notices, through insight, that her reaction was not simple anger.\n\nIt was terror first, then grief or guilt, almost as though she had lost the dagger rather than merely thrown it.\n\nThat detail strongly suggests a deeper history behind her reflexes.\n\nMore truths about life in Vastraya\n\nMara explains more as they travel.\n\nLife here is difficult.\n\nA person can be hunted by:\n\nthe Refracted\n\nscavengers\n\nother survivors\n\npeople very much like the party themselves\n\nWhen asked whether everyone here is a shipwreck survivor, Mara says very little and remains guarded.\n\nWhen asked whether all of her companions are shipwreck survivors or whether some are native to the land, she strongly implies that the natives are not to be trusted and that life in Vastraya teaches you not to pry into other people’s affairs.\n\nWhen asked why she herself is here, Mara answers simply:\n\nMara: “Because we were betrayed.”\n\nZaren asks about the Captain\n\nZaren: “We were betrayed by our captain.”\n\nMara replies with sharp contempt:\n\nMara: “Nice to meet you, Zaren. You speak too much for a very wise person, and you do not seem very bright. In Vastraya, we help each other survive. You are my friend until you are my enemy.”\n\nThis is a pointed response. She accepts the introduction, but she is already reading him critically.\n\nLysandra’s cat becomes something else\n\nAs they continue, Lysandra’s black cat begins shifting in strange ways.\n\nAt one point it becomes a toddler-like child, around a year and a half old, with slightly yellow skin.\n\nZaren can tell it looks human-shaped, but not truly human.\n\nThe transformation happens without Lysandra casting anything or taking visible action.\n\nMara does not react with fear to the cat or the toddler form, even though she instantly killed Caspian’s flying familiar.\n\nShe seems confused, but not threatened.\n\nThat contrast matters.\n\nThe coast, the tide, and the dead land\n\nThe group continues along the coast, slightly inland.\n\nThe black sand crunches underfoot like obsidian and quartz.\n\nThe land is dead and burnt.\n\nThe tide behaves unnaturally, receding and returning much too quickly.\n\nWhen Zaren asks whether the hunters come from the sky, Mara answers:\n\nMara: “Some come on the ground. Others come in the sky.”\n\nThat confirms the danger is not limited to ground level.\n\nThe wreck that looks like a structure\n\nEventually, as they approach Hold Mount, they spot what at first seems to be a structure on the shore above a cliff.\n\nAs they get closer, they realize it is not a building at all.\n\nIt is the wreck of a ship smashed across rocks and twisted metal.\n\nThen they hear a rhythmic thudding sound.\n\nAt first it sounds mechanical.\n\nBut as they close in, it becomes visceral and organic, like something roaring from deep in its throat.\n\nThe sound is coming from the far side of an encampment.\n\nMara breaks\n\nThe moment Mara hears the sound clearly, everything about her changes.\n\nShe reaches for a dagger, but the one she threw earlier is gone.\n\nSo she draws her shortsword instead and sprints toward the encampment with unnatural, animal-like speed, dropping low as she runs.\n\nThe others follow as best they can.\n\nCaspian’s familiar scouts ahead and reports:\n\nfigures inside the encampment\n\none figure standing on the wall, looking toward the source of the sound\n\nMara circles the encampment instead of charging straight through.\n\nThen, suddenly, she reappears running away from the far side of it, clearly fleeing something.\n\nCaspian calls after her, trying to help, but Mara shouts:\n\nMara: “Not another one of those. Go away.”\n\nWhen Zaren closes the distance, he hears her repeating through tears:\n\nMara: “By the Four Nails. By the Four Nails. By the Four Nails.”\n\nHer hand is shaking around her blade. Her face is pale and wet with tears.\n\nShe looks at him and says:\n\nMara: “Help them. Help them. Help them.”\n\nZaren asks how he can help effectively.\n\nMara, still breaking apart, answers:\n\nMara: “You will die. You will die. You will die. By the Four Nails.”\n\nHe asks for a weakness.\n\nAt last, she forces out the only useful answer she can manage:\n\nMara: “Crystals. Aim for the crystals.”\n\nThat is where the battle begins.\n\nThe battle at the gate\n\nAt the start of the fight, Caspian moves to gain a better angle while his familiar returns to his shoulder so he can see through it more clearly.\n\nFrom that vantage point, he sees the situation clearly:\n\na large glass creature is battering a gate\n\na small figure is nearby\n\na man from inside the encampment is trying to defend the people behind the gate\n\nThe small figure vanishes and reappears repeatedly, moving by teleportation rather than normal motion.\n\nThe boy is speaking to Zaren, not to the whole party. He clearly thinks Mara has lost her mind.\n\nThen the boy draws a metal shard or tool and strikes the large creature twice.\n\nThe hits matter. The creature visibly loses focus on the gate and begins to turn away from it.\n\nThen the boy teleports again.\n\nLysandra begins the counterattack\n\nLysandra acts next.\n\nShe places an area effect carefully, making sure not to catch the small figure.\n\nFrom Zaren’s perspective, the ground begins glowing and dying under the creature as the effect spreads.\n\nThe creature keeps moving through the effect and continues taking damage from it.\n\nCaspian fires at the torso crystal\n\nThen Caspian closes the distance enough to attack at range.\n\nHe studies the monster and asks which crystal is the main one.\n\nThe answer:\n\nthe largest crystal is the white one in the torso, with purple around it\n\nthe crystal in the head is entirely purple\n\nthe rest of the body contains different colors\n\nCaspian chooses the torso crystal.\n\nHis shoulder-mounted mechanism locks on with a laser.\n\nHe extends his arm and fires.\n\nThe shot is devastating, dealing an enormous hit of roughly fifty-five damage.\n\nThen the device on his shoulder changes shape, sprouts spider-like legs, and flies forward under its own power to get closer to the fight.\n\nThe child falls, the monster closes, and Zaren goes into melee\n\nThe creature survives Caspian’s blast and keeps fighting.\n\nAt one point it lashes out at the small teleporting figure and hurls him backward into a crate.\n\nHe drops unconscious immediately and begins dying.\n\nThen the large creature performs a leaping slam, jumping thirty feet and crashing down near the party.\n\nZaren avoids the impact and takes no damage from the landing.\n\nNow the creature is directly on top of him.\n\nZaren attacks in melee with his greatsword.\n\nHe targets the torso crystal first.\n\nHis hit lands in two parts:\n\nblunt force, which is not especially effective\n\nradiant damage, which lands much harder in the darkness\n\nThe creature reacts far more strongly to the radiant portion.\n\nThat confirms another crucial clue:\n\nit is more vulnerable to radiant damage than to ordinary impact.\n\nThe glass woman arrives\n\nLysandra keeps attacking from range, hiding in dim light, marking the target, and controlling its position.\n\nThen, in the middle of the fight, a glass woman appears suddenly beside the unconscious child in a burst like shattering glass.\n\nShe kneels, lifts him up, and carries him.\n\nThis is clearly not random. She is reacting specifically to the fallen child.\n\nHer arrival means the battle is tied to real people in the encampment, not just isolated monsters.\n\nForced movement and the fall\n\nLysandra uses her force effect again, shoving the large creature toward the cliff edge.\n\nShe follows with another push and sends it farther off balance.\n\nThe creature is now on the verge of falling.\n\nHer spider familiar closes in and bites it.\n\nThe venom matters. The creature shows visible signs of being affected by the poison.\n\nMeanwhile, Caspian keeps pressure on it from range and asks the defenders to tell him its vulnerabilities.\n\nTheir answer matches Mara’s:\n\nthe crystals matter.\n\nThe large creature attacks again, trying to break through and kill whoever is nearest.\n\nZaren tries to overpower it physically and force it off balance, but it resists.\n\nAlex, still farther from the main fight, continues attacking from range. One attack misses, another lands.\n\nBy this point the creature is visibly bloodied, with cracks spreading across its body, especially around the targeted crystal region.\n\nSilver, the cliff, and the stabilizing touch\n\nThe small teleporting fighter is identified by name:\n\nSilver\n\nHe recovers just enough to act again and darts back in with impossible speed, sliding low and striking at the creature’s legs and heels, trying to destabilize it rather than simply wound it.\n\nHis hits glance off the hardened plating, but the intent is clear.\n\nLysandra attacks again with the staff, lands the hit, chooses the direction carefully, and finally sends the creature sideways off the cliff.\n\nIt falls onto another figure below, and both the falling damage and the impact damage land.\n\nThe large Refracted is now off the high ground.\n\nAt the same moment, Zaren tries to catch Silver with a reaction before the boy hits the ground, but Silver slips through his grasp.\n\nBoth Silver and the creature take the fall.\n\nSilver drops unconscious.\n\nLysandra holds position rather than moving and risking retaliation.\n\nCaspian sees Silver go down and immediately acts.\n\nAt first he thinks of sending his familiar to help normally, but then instinct takes over. While the familiar is touching Silver, he channels the strange energy building in the shield through it.\n\nThe result is unexpected.\n\nThe familiar opens, and two purple human-like fingers emerge from it and press against Silver’s face.\n\nSilver stabilizes.\n\nHe is still unconscious, but no longer dying.\n\nThis is a major discovery for Caspian:\n\nthe shield can somehow channel restorative or preserving energy through the familiar, even though he does not yet fully understand how.\n\nThe creature changes color before it dies\n\nCaspian then rotates the turret and fires flame at the enemies below.\n\nThe smaller enemy is already badly hurt. The larger one is still bloodied, but not finished.\n\nThe spider familiar is pulled back to safer range.\n\nThen the large creature below rises again and begins screaming.\n\nIts color behavior changes in a very important way.\n\nIt tears part of itself free and raises it like a weapon.\n\nAs it does, something that had been white shifts to purple.\n\nThe change is obvious enough that the group notices immediately.\n\nThe color transition matters.\n\nIt likely reflects either a state change in the creature or a change in which crystal or energy source has become dominant.\n\nThe encounter ends\n\nThe fight continues only briefly after that.\n\nBy now the defenders clearly have the advantage.\n\nBetween:\n\nthe party’s focus fire\n\nLysandra’s forced movement\n\nZaren’s pressure in melee\n\nCaspian’s ranged damage\n\nSilver’s disruption\n\nthe creature is finally brought down.\n\nThat ends the encounter.\n\nArrival inside the encampment\n\nAfter the fight, the party reaches level 6.\n\nThey are brought fully inside the encampment.\n\nInside, they meet Elder Vorn.\n\nThe encampment contains around fifteen people in total.\n\nAbout ten of them are lying on the ground, blue-skinned like corpses, unmoving except for the fact that they are still breathing.\n\nThey are gathered around a statue or central object.\n\nThey are not truly awake, but they are not dead either.\n\nWhen someone asks about the glyphs, Silver proudly says:\n\nSilver: “My work. I do that.”\n\nSilver speaks like a child and an adult at once.\n\nHe looks no older than about ten, but his manner feels older.\n\nZaren introduces himself as:\n\nZaren: “Zaren of the Winged Watch.”\n\nSilver thanks the party warmly and says he could not have kept going much longer. He says the monster had already knocked him out many times before they arrived.\n\nThe party now notices Silver’s glass more clearly:\n\nyellow glass like Lysandra’s on one side\n\nblack glass like the others on the other side\n\nbut unlike the party’s bonded shards, Silver’s glass appears to have grown from inside him\n\nThere are growths from his head and collarbones.\n\nThis is very different from the party’s own bondings.\n\nMara enters, removes three nails, and disappears\n\nThen Mara enters the encampment.\n\nShe comes over the wall without a word.\n\nHer face is completely unreadable.\n\nShe walks straight to the center, removes three nails from the central post or pillar, puts them in her pocket, and disappears into her tent without explanation.\n\nThis immediately raises questions.\n\nIf a nail is placed whenever someone dies, or if the nails mark some other kind of bond, then removing three of them clearly means something important.\n\nBut no answer comes yet.\n\nVorn writes their names onto himself\n\nThe situation in the encampment becomes clearer:\n\nElder Vorn welcomes the party\n\nthe glass woman who recovered Silver stands nearly motionless in the center\n\nMara has withdrawn\n\nthe ten blue people under the statue are alive, but barely\n\nWhen asked if everyone here is one family, Vorn answers:\n\nVorn: “We are all what we have. Whoever is here is part of the family.”\n\nBefore the questions go too far, Caspian steps in and says plainly that they understand this is a difficult moment, but they know nothing and need answers.\n\nVorn asks:\n\nVorn: “Did Mara help you?”\n\nCaspian answers that she did.\n\nVorn asks each of them for their names.\n\nThey all give them.\n\nThen Vorn opens his shirt.\n\nEmbedded in his chest is a purple crystal, very similar to Zaren’s. His body is covered in names, written directly on his skin.\n\nHe takes out a small coil or stylus and writes each of their names onto himself.\n\nThen he says:\n\nVorn: “Now I will keep your names forever.”\n\nThere are dozens and dozens of names already written on his body, perhaps more than eighty.\n\nVorn begins explaining the encampment\n\nOnce the party is seated, Elder Vorn begins speaking more openly.\n\nHe says it is a difficult day, and that this is only the third time in his life that he has seen a creature like the one they just fought.\n\nThe last time, he says, Mara can tell them about it, not him.\n\nWhen asked whether that is why Mara ran, Vorn says yes, but refuses to tell Mara’s secrets in her place. If she wants to speak, she will speak.\n\nWhen asked whether creatures like that appear often, he says no. They are very rare. This is only the third time one of those monsters has forced them to move encampments.\n\nVorn reveals who he is and how long he has been here\n\nThe party asks whether Vorn is one of the elders of the camp and whether he has been here a long time.\n\nVorn answers:\n\nVorn: “I am the only one in the camp. I am the only permanent one in the camp. I set up this camp thirty years ago to help people exiled from…”\n\nHe trails off, but the meaning is clear enough.\n\nWhen asked what he means by permanent, he explains that everyone here is temporary. People come and go. People are short-lived in this land.\n\nThen he speaks with brutal honesty about the others:\n\nSilver may only have about a year left\n\nMarisha, they do not know\n\nMara, he would give five more years\n\nas for himself, he wakes every day expecting his end, and it never comes\n\nThis establishes the entire camp as a place of survival, not recovery.\n\nThe truth about the blue bodies and the need for glass\n\nThe party pushes for the truth.\n\nWhat exactly is happening here? What is the sickness in the land? Why do they need the glass? Are they all slowly dying?\n\nVorn answers plainly:\n\nYes, they are slowly dying.\n\nHow quickly depends on how much glass they have bonded.\n\nIf the party had not bonded with glass, they would have ended up like the blue people lying on the ground, or worse.\n\nHe gestures toward the ten breathing bodies gathered around the central object and explains:\n\nIf they are found too late, they either become Refracted or become Hollow.\n\nThis confirms that the blue people are not a separate species. They are failed survivors.\n\nMara tries to end the suffering of the blue ones\n\nCaspian says something important at this point:\n\nhe needs Vorn’s help protecting the blue bodies from Mara.\n\nVorn understands immediately.\n\nHe explains that Mara tries to end one of them every day because she believes they are suffering.\n\nIf the party sees Mara near them, Vorn says, they should call for him.\n\nThis reveals something essential about Mara:\n\nshe is not simply hardened. She is living alongside the suffering every day and has begun treating mercy and killing as neighboring ideas.\n\nWhat the land is doing to them\n\nWhen asked what is happening to the land and why everyone here is deteriorating, Vorn says it is the same story everyone knows:\n\nthe land is dead, and it is hungry for them.\n\nThe camp knows one practical truth above all others:\n\nthe glass helps them survive, but only prolongs their time.\n\nThis is not a permanent solution. It is an extension.\n\nWhen asked why the glass works at all, Vorn explains:\n\nVorn: “It protects us from the land. The smog and the earth here are aggressive. They want to bond with your blood and consume it.”\n\nThat is the clearest statement yet of what Vastraya actually does:\n\nthe land itself is trying to bond with them.\n\nThe glass is a defensive compromise, not a cure.\n\nThe Steel Grid and Vorn’s lost faith\n\nVorn identifies himself more fully:\n\nVorn: “Currently, I am Vorn of the Steel Grid.”\n\nThe party recognizes what that means.\n\nThe Steel Grid, or Order of the Steel Grip, follows Arcanon. It is associated with builders, architects, masons, archivists, and people who believe the world must be physically held together.\n\nIts faith is structural and practical: the world does not remain whole through ideals alone. Someone has to build, reinforce, and bind it.\n\nVorn then explains:\n\nhere, he is Vorn of the Steel Grid\n\nin the old world, he was an archivist in the Ministry of Sanctity\n\nhe used to be a devout follower of Lunaria\n\nhe lost all faith after what happened to him\n\nCaspian begins to realize his story may align with Vorn’s\n\nCaspian tells Vorn that their stories may align.\n\nHe says that he was betrayed by Auditor Dominus, the Auditor Prime. He says he was a high-ranking researcher in the Ministry and had created an invention that was more sought after than he realized.\n\nVorn asks him:\n\nVorn: “Invention? Are you an architect?”\n\nCaspian says yes.\n\nVorn answers immediately in practical terms:\n\nVorn: “Can you help us here?”\n\nCaspian says he will do his best.\n\nVorn tells him to speak with Charcy, who will explain what the camp needs, because their current situation is dire.\n\nHouse Aurelian and the theft of invention\n\nCaspian continues his story.\n\nHe says a royal family was trying to get hold of his invention and ruined his reputation in order to seize his patents.\n\nVorn asks which family.\n\nCaspian names House Aurelian.\n\nVorn recognizes the name and says they are a minor house, but an ambitious one.\n\nCaspian says their ambition is dark. From his point of view, they tried to frame him as a heretic so they could take what he had built.\n\nVorn pushes back:\n\nVorn: “To be exiled, you must have done something.”\n\nCaspian answers that, from his perspective, not really. They tried to paint him as a heretic.\n\nThen Vorn shifts the conversation and asks a more pointed question:\n\nVorn: “What do you follow?”\n\nHe wants to know Caspian’s path and faith, because if he truly was framed or truly saw something, that matters.\n\nCaspian answers honestly that he used to follow Lunaria, but his faith is shaken now.\n\nVorn asks whether that break came because of exile, or whether it started before.\n\nCaspian says it began after he started seeing what was really happening on the island.\n\nVorn presses him:\n\nVorn: “What have you seen?”\n\nCaspian says that he has not seen anything mystical in the obvious sense. Mostly politics, corruption, and what people do to each other.\n\nVorn answers with weary certainty:\n\nVorn: “Yes. It is always politics.”\n\nZaren’s exile and chosen silence\n\nThe conversation shifts toward Zaren.\n\nVorn is surprised that a Marshal in the Guilded Guard now openly follows the Winged Watch.\n\nHe remarks that the island has become more progressive than he remembers, enough that he could almost consider going back.\n\nZaren confirms that in the empire now, the sons of the Church of the Sovereign Scars can follow different paths.\n\nVorn asks him:\n\nVorn: “Did you see something that got you exiled?”\n\nZaren answers:\n\nZaren: “I was exiled by choice. And we’ll keep it at that.”\n\nThat answer closes the door rather than opening it.\n\nMara whispers one word that changes everything\n\nAt that moment, Mara comes out and joins them.\n\nShe sits down with them carrying a crate, sets it down, and asks Vorn coldly:\n\nMara: “What lies has this one told you?”\n\nVorn replies that he has not yet had the chance to hear any lies.\n\nMara leans close to Vorn and whispers something in his ear.\n\nZaren strains to hear.\n\nHe catches only one word:\n\n“Children.”\n\nVorn’s reaction is immediate and intense.\n\nHe is visibly disgusted.\n\nHe physically gestures away from the party, specifically away from Caspian, as though wanting distance between them.\n\nThis matters because it suggests that one of them has just been linked, in Mara’s mind, to the Children of the Flame.\n\nAlex speaks with Silver about family\n\nWhile that tension is unfolding, Alex turns to Silver and speaks to him more gently.\n\nShe asks what his connection to Mara is, and how he came to be here.\n\nSilver says:\n\nSilver: “Mara and Marisha have been taking care of me for the past ten years. I consider them my family.”\n\nWhen asked about his parents, he says:\n\nhe never knew his father\n\nhis mother died giving birth to him\n\nBut he says it lightly, trying to make it sound fine:\n\nSilver: “It’s all good, right? I’m still living.”\n\nSomeone reassures him that it is all good.\n\nThen Silver says something important:\n\nfamily is not only blood.\n\nThere are other families in life.\n\nAt that exact moment, Alex hears a childlike voice in her head say:\n\nVoice: “I like this one.”\n\nIt is not the spider familiar.\n\nIt is something else.\n\nSilver wants to go back, even though he has never been there\n\nAlex asks Silver why they never tried to go back.\n\nSilver says he has never gone back because he has never been there.\n\nHe has only heard stories.\n\nHe says the island sounds colorful and beautiful, and that he wishes he could see it.\n\nAlex promises that if they find a way back, they will take him with them.\n\nThen she asks Vorn directly:\n\nAlex: “Is there a way back?”\n\nVorn answers:\n\nVorn: “Yes. There is definitely a way back. It is difficult. It is dangerous. I have never heard of someone doing it. But I had also never heard of someone killing a hulking Refracted, so maybe you can do it.”\n\nHe says he can give them information that might send them toward Cyriath, or toward another route, or both.\n\nBut if he does, he may ask for something in return.\n\nThe Siren and the Cavern of Sorrow\n\nBefore Vorn can continue into a full explanation of the monsters, Mara interrupts.\n\nShe says that maybe the party can help the camp by getting rid of the Siren.\n\nIf they could kill the one outside, maybe they can also rid them of her.\n\nThe party immediately focuses on the word:\n\n“Siren?”\n\nVorn explains:\n\nthey call her a Crystallized Siren.\n\nShe is one step above a Refracted.\n\nShe used to be one of them.\n\nNow she stays in the Cavern of Sorrow.\n\nThey call it that because it is where the less favored people stay.\n\nVorn suggests that the party may find what they need there, or at least find the road toward it.\n\nHe adds that ever since the Siren moved out of the camp and into the caverns, there has been more Refracted activity nearby.\n\nHe does not think she directly attracts them, but her presence is not good to have close.\n\nWhen asked whether she really was once one of their people, Vorn says yes.\n\nHe believes her name was Mervel Haloval.\n\nMara explains why she fears the hulking Refracted\n\nThe party presses Mara.\n\nThey tell her that if she believes in deeds more than words, then the fact that they helped the camp should matter.\n\nThey argue that even one of the less favored people would try to protect her family.\n\nThat argument finally gets through enough for Mara to explain herself.\n\nShe says she has seen one of those huge creatures before.\n\nThis is the second time.\n\nTen years ago, when she was deployed on Vastraya as part of the Ebony Legions, her platoon was ambushed by one of them.\n\nShe was the only one who survived.\n\nShe survived because she ran.\n\nAnd that still breaks something in her.\n\nMara: “I promised I would never run. I was training my whole life not to run. But you’ve seen them. You’ve seen what they can do. I do not have fancy magic like you. I could only survive with what I had.”\n\nThe party pushes back, telling her that she does not have to fight alone anymore. If she works as part of a team, they can support her.\n\nMara resists.\n\nShe says:\n\nshe does not want to go back out into the land\n\nif she leaves, Vorn dies\n\nSilver dies\n\nthe camp dies\n\nThe party answers that they will take all of them if they have to.\n\nZaren pushes even harder, telling her that everyone here only dies if they give in to fear, and that survival is still possible if they stand together.\n\nAt that point, the argument escalates too far.\n\nVorn enforces peace\n\nVorn intervenes.\n\nHe strikes his staff or cane against his chest, and all four of them hear a voice in their minds:\n\nVorn: “Peace.”\n\nThey are magically frightened for the next minute and cannot take hostile action against the camp.\n\nCaspian quickly tries to calm the situation and explains mind-to-mind that they are not here to fight. He is only trying to pull Mara back from whatever mental place she has fallen into.\n\nVorn acknowledges that.\n\nMara is still not convinced, but she is no longer fully closed off.\n\nShe is on the fence.\n\nExvald’s Ridge and the work-camp truth\n\nThe party then asks an important practical question:\n\nWhat were Mara’s orders when her platoon was deployed here?\n\nMara answers:\n\nthey were part of the team building Exvald’s Ridge.\n\nThe party asks what Exvald’s Ridge actually is.\n\nMara says that if they were exiled here, that is most likely where they were supposed to be taken.\n\nIt is effectively a work camp.\n\nNot exactly a prison in the traditional sense, but close enough.\n\nShe adds that Mervel had said something different about it, and no one really believed her.\n\nThe party asks when Mara last saw Mervel.\n\nMara says:\n\nabout two years ago.\n\nShe explains that when they rescue people exiled from the empire and those people turn out to be “unfaithful,” those people often go to Mervel.\n\nThe camp does not interfere with that, as long as Mervel stays in her part of the land and they stay in theirs.\n\nAs long as the Ebony Legions do not find them, they can keep surviving.\n\nThe camp is not trying to save the world, only to keep people from becoming the blue bodies\n\nThe party argues that Mara is already doing in one form what they are trying to do in another: keeping people alive, building chosen family, resisting collapse.\n\nMara answers that the party can leave this place any time they want.\n\nThey can die now and go back to their god if they wish.\n\nThe party answers that they want to leave alive.\n\nMara says then they need her experience, not her affection.\n\nIf they want to stay here, the encampment hunts, scavenges, worships, and survives. That is their life.\n\nIf the party wants to risk trying to return to Cyriath and the people who exiled them, they are free to do so.\n\nCaspian makes it clear that they are not here to change Mara’s way of life or mock it. They only want to understand the place and find where they fit in it.\n\nMara answers grimly:\n\nthey are trying to stop people like the party from ending up like the blue bodies lying nearby.\n\nThat is her calling.\n\nCaspian says maybe they should try to end the cycle entirely instead of only treating the symptoms.\n\nMara gives him a hard look and says:\n\nMara: “Very nice words. Come talk to me again when you’ve been here a year.”\n\nDirections to the Siren and the first clear map\n\nThe party asks for directions to the Siren.\n\nVorn answers:\n\nshe lives by the Cavern of Sorrow.\n\nTo get there:\n\ngo north until you find the bridge, Elevand Crossing\n\nfrom there, head east\n\nit should be straight ahead\n\nCaspian asks where the tide throws wreckage, where anything from their ship might wash up.\n\nVorn says that Charcy is the one to ask about scavenging. She knows how wreckage moves and where it ends up.\n\nCaspian also asks whether the camp has gone farther inland.\n\nVorn says they did, back when they had more people.\n\nBut the farther inland you go, the denser the glass becomes. The terrain hardens. The glass becomes more aggressive. The creatures become more likely.\n\nStaying by the shore has been the safest thing they have managed for the last ten years.\n\nThe “natives,” Hollows, and Refracted are not the same thing\n\nThe party asks about the “natives” Mara mentioned earlier.\n\nVorn says there are what one might call natives, but they are not really people.\n\nWhen pressed, he clarifies:\n\nHollows are still people, in a sense. They are exiles overtaken by the smog.\n\nRefracted are still people too, in a sense. They are exiles overtaken by glass.\n\nthe “natives” are something else entirely\n\nThis is an important distinction.\n\nNot everything monstrous in Vastraya is the same kind of fallen human.\n\nThe shard system becomes clearer\n\nThe party asks more about shard colors and body placement.\n\nVorn explains:\n\neach color behaves differently\n\ndifferent people align better with different colors, perhaps depending on personality\n\none shard is enough if you can help it\n\ndo not bond more if you can avoid it\n\nAt that moment, Silver proudly cuts in:\n\nSilver: “I have six.”\n\nVorn explains that Silver is the most heavily bonded person in the camp.\n\nHe has six shards.\n\nWhen asked what advantage that gives him, Vorn points to the obvious:\n\nthey saw him teleport.\n\nHe was not born doing that.\n\nNone of them are magical by nature. The glass is what gives them those abilities.\n\nSilver adds:\n\nhe has three black shards\n\nand three yellow shards\n\nHe also says something very important:\n\nblack and yellow work together.\n\nSome combinations do not.\n\nThat is the first explicit practical advice they receive about multi-bonding compatibility.\n\nThe Feast of the Nails\n\nThe party asks about the three nails Mara removed earlier.\n\nMara tells them maybe “Mr. Winged Watch” can explain.\n\nThe answer leads into the Feast of the Nails.\n\nFrom the island’s perspective, it is a holy day celebrated once a year by followers of the Quadrants.\n\nAll followers, regardless of sect, perform free public labor for a day:\n\nrepairing bridges\n\ncleaning streets\n\nbuilding things\n\nserving the community\n\nThe idea is that survival happens through chains, connection, and obligation.\n\nThere is also an initiation rite attached to it:\n\nwhen children come of age, they receive an iron nail and drive it into the family post.\n\nEach household has a central post or structure. Driving the nail is a sign of belonging and standing within the chain.\n\nThe prayer behind it is essentially about not undoing the unmaking, but having the strength to stand upon its pieces.\n\nThe party realizes something important:\n\nthe post in the encampment functions like a family post.\n\nThe camp itself is using one.\n\nThat brings them back to Mara and the three nails she removed.\n\nThe logic becomes clearer:\n\nif someone shames or severs themselves from the family deeply enough, nails can be removed.\n\nIn Mara’s case, three nails means something more than private shame. It means severing herself from a chosen family chain.\n\nAnother layer comes out:\n\nthe other two nails she carries belong to people who have already died.\n\nShe carries their nails until she dies.\n\nThat means Mara’s chosen family includes Silver and two dead people whose memory she still physically bears.\n\nThe nails are not decoration. They are records of bond, belonging, shame, death, and obligation.\n\nThe hidden Auditor rumor\n\nAt one point, Vorn quietly pulls Caspian aside.\n\nHe says he heard Caspian mention an Auditor earlier.\n\nThen he reveals a rumor:\n\nthere is supposedly an Auditor hiding somewhere in Vastraya, in the Broken Teeth Peaks.\n\nVorn explains that no one knows exactly what “hiding” means.\n\nMaybe the Auditor is hiding from the Ebony Legions. Maybe he is offering safe passage. Maybe people are trading him to the Legions in exchange for safe passage.\n\nNo one knows which version is true.\n\nBut Vorn thinks the rumor may connect to the things Caspian has been saying.\n\nThis becomes one of the party’s major future leads.\n\nVorn tells his own story\n\nThe party asks Vorn what it means that he said he chose exile.\n\nWhat was the alternative?\n\nVorn answers:\n\ndeath.\n\nHe then explains his history.\n\nHe used to work as an archivist in the Ministry of Sanctity.\n\nAround ten to fifteen years ago, he was responsible for archiving annual yield reports that tracked the aether crystal economy:\n\nhow much aether energy was produced\n\nhow much was stored\n\nhow much was consumed\n\nhow much was distributed\n\nThat is where he found something impossible.\n\nHe discovered that solar calcination, the process tied to the Prayer of Ignition and crystal preparation, was becoming less efficient over time, not more efficient.\n\nThe discrepancy was enormous.\n\nA Tier 1 aether crystal from years ago held the effective output that now required a Tier 2 crystal.\n\nThat meant the empire was burning more aether to achieve the same result.\n\nAt first Vorn thought this had to be a paperwork error.\n\nHe reported it to his superior, expecting praise.\n\nInstead, his life vanished.\n\nHe went out drinking that night in celebration.\n\nWhen he returned, his house was smoke.\n\nHis family had paid the price.\n\nThe next day, his superior had been transferred.\n\nWorse than that, Vorn himself had been erased.\n\nHis name was removed from the census. His marriage record vanished from temple archives. His children’s names no longer existed in school rolls.\n\nVorn: “I stopped existing.”\n\nThen he says something even colder:\n\nVorn: “They did not want to kill me. They wanted to make sure I never happened.”\n\nSo he chose exile himself.\n\nThe alternative, he says again, was death.\n\nThe party realizes someone is sabotaging the aether system deliberately\n\nThe implications of Vorn’s story are enormous.\n\nOn one hand, House Vermont is associated with making crystal use more efficient.\n\nOn the other hand, Vorn discovered that at a national scale the empire had, for years, been making the crystal system less efficient on purpose.\n\nThat means someone, somewhere in the empire, benefits from strangling the engine.\n\nNot by reducing how much aether is stored in the crystal, but by making the output system itself worse.\n\nThe same energy goes in, but more is wasted.\n\nMore aether must be burned to achieve the same effect.\n\nThat is not random failure.\n\nThat is design.\n\nThe party realizes this may connect:\n\nmajor houses\n\nstate planning\n\nexile policy\n\naether economy\n\nhidden political control\n\nin ways none of them yet fully understand.\n\nMarisha heals Caspian and tells her story\n\nLater, Caspian approaches Marisha directly.\n\nHe introduces himself and thanks her for what she did for Silver.\n\nMarisha answers in a low, rough voice, almost damaged, as if something is wrong with her throat.\n\nCaspian asks for help with his injured hand.\n\nMarisha takes it, murmurs something under her breath, and he hears the sound of glass.\n\nThen the injury is healed.\n\nThe lingering penalty on his hand is gone.\n\nCaspian asks how she acquired a gift like that and whether she will tell him her story.\n\nMarisha agrees.\n\nShe explains that she used to be a high-ranking medic in the Cyriath Vanguard, an elite unit within the Ebony Legions.\n\nShe already had an affinity for magic back on the island, but never received a formal license to use it openly.\n\nSo she practiced medicine as a doctor rather than as an officially recognized mage.\n\nWhat ruined her was curiosity.\n\nShe began noticing something impossible in the military system: the empire was expanding its military infrastructure at a rate that implied hidden war or hidden need.\n\nSo she started snooping.\n\nThat is how she discovered the Ghost Wards.\n\nThese were secret military hospitals.\n\nBut they were not really for healing.\n\nPeople sent there were not being restored.\n\nThey were being processed and moved.\n\nMany were terminally ill. Many were critically wounded. Many were simply inconvenient.\n\nInstead of receiving care or dignified death, they were shipped to Vastraya.\n\nMarisha tried to expose it.\n\nFor that, she was branded a traitor, stripped of rank, and exiled.\n\nBecause of her old status, she was at least granted the courtesy of being left alive on the shore with only what she carried.\n\nMarisha’s body is no longer human in the ordinary sense\n\nCaspian asks why she bonded with so much glass, and how it began.\n\nMarisha says that when she arrived, no one taught her how to bond properly.\n\nHer lungs began to liquefy.\n\nSo she embedded a Vitreum shard in her chest to replace her respiratory system.\n\nLater, when she realized she might still be able to save others, she turned to magic. She had no proper surgical tools, no kits, no supplies. So she used glass as a material component and kept going.\n\nShe explains:\n\nshe does not need to eat\n\nshe does not need to sleep\n\nshe does not need to breathe\n\nshe no longer suffers the same static and internal screaming the others do\n\nCaspian asks if what happened to her can be reversed.\n\nMarisha says no.\n\nIt is irreversible.\n\nShe is on her way out.\n\nAll she can do now is save as many people as she can before the end.\n\nShe also says she is the only one of her kind she knows of:\n\nan “after,” someone whose body has been replaced piece by piece by one type of glass.\n\nThe party understands that when Marisha revived Silver earlier, that was one of the gifts of her yellow glass.\n\nThe four Quadrant paths are clarified\n\nMarisha identifies herself as being of the Iron Hand.\n\nThat leads to a broader clarification of the four paths:\n\nSteel Grip follows Arcanon and is associated with builders, masons, and architects\n\nIron Hand follows Kaelanor and is associated with healers and farmers\n\nIron Will follows Vajran and is associated with scouts, hunters, and survivalists\n\nWinged Watch follows Ceraphex and is associated with sentries and scholars\n\nThe party begins noticing that these four paths may connect to other structures and symbols they have already seen.\n\nThe camp’s view of Mervel and the Children of the Flame\n\nThe conversation returns to Mervel, the Siren.\n\nThe camp says they do not exactly hate her, but they want her gone because ever since she left the encampment, Refracted attacks have become more frequent.\n\nWhen asked whether they know for sure that she is the cause, the answer is no. It is still technically correlation rather than certainty.\n\nThey also say Mervel was a follower of the Children of the Flame.\n\nFrom the camp’s point of view, that matters a great deal.\n\nThey describe the Children of the Flame as fanatics and terrorists who wanted to break the empire because they hated the empire, and to break the Quadrants because they hated the Quadrants.\n\nTheir summary is brutally simple:\n\n“If it is terrorism, it is flame.”\n\nThey also reveal that Mervel has followers.\n\nUsually, they are exiles she reaches before the encampment does.\n\nThat is one reason the camp sometimes directs certain kinds of exiles toward her rather than taking them in.\n\nSilver’s mother and his birth-bound shard\n\nThe party asks about Silver’s mother.\n\nThe camp explains:\n\nshe was an exile\n\nthey did see her\n\nthey did not reach her in time\n\nshe was already dead when Silver was born\n\nMarisha delivered Silver.\n\nSilver was born already carrying a yellow shard, the same type as Marisha’s.\n\nLater, Marisha bonded him with another shard too.\n\nWhen asked why they would heavily bond a child like that, the answer is blunt and painful:\n\nhe is going to die anyway.\n\nThe land does not show children mercy.\n\nCharcy becomes the practical guide to survival\n\nThe party then approaches Charcy.\n\nCharcy is lively, sharp, and immediately treats the interaction like a market exchange.\n\nShe asks what brings them to the encampment and quickly shifts the conversation toward survival and trade.\n\nShe notices immediately that Caspian is bonded and asks what color his shard is.\n\nWhen she hears it is purple-gray and smoke-like, she says she has names for these things. Not official names, but field names she has given them based on what she has seen them do.\n\nHer taxonomy is:\n\nIgnis for the orange type, which keeps her warm\n\nMantis, also called the Whisper shard, for the yellow type, which tends to vibrate inside the head\n\nGravitas, or in some contexts Anchor shard, for the purple-gray heavy type associated with weight, grounding, and anchoring effects\n\nShe makes clear these are her names, not official scientific categories.\n\nWhen asked how she knows all this, she explains that she trades, watches, and names what she sees.\n\nThat is her work.\n\nSurvival is barter: gloves, canteens, lanterns, kits\n\nCharcy says life in Vastraya runs on a pure barter system.\n\nHer first practical priority for them is not weapons.\n\nIt is:\n\ngloves\n\nwater\n\nShe points out that they do not have proper gloves, and that trying to live here without them is suicidal. Touch enough glass bare-handed and they could end up bonded whether they want to or no
